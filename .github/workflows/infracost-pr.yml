name: Infracost PR Cost Diff

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - github/workflows/infracost-pr.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost-diff:
    name: Post cost diff to PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Checkout base branch into /tmp/base
        run: git worktree add /tmp/base ${{ github.event.pull_request.base.sha }}

      - name: Generate baseline cost JSON
        run: infracost breakdown --path /tmp/base --format json --out-file /tmp/infracost-base.json

      - name: Generate PR diff JSON
        run: infracost diff --path . --compare-to /tmp/infracost-base.json --format json --out-file /tmp/infracost.json

      - name: Print diff to log
        run: infracost diff --path . --compare-to /tmp/infracost-base.json --format diff

      - name: Upload diff to Infracost Cloud
        run: infracost upload --path /tmp/infracost.json

      - name: Post PR comment
        run: |
          infracost comment github \
            --path /tmp/infracost.json \
            --repo "${{ github.repository }}" \
            --pull-request ${{ github.event.pull_request.number }} \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --behavior update
